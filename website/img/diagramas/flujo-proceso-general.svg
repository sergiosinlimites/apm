<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200" role="img" aria-labelledby="title desc">
  <title id="title">Flujo General del Proceso de Manufactura</title>
  <desc id="desc">Diagrama horizontal del proceso de embotellado desde insumos hasta despacho.</desc>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#A8201A"/>
    </marker>
  </defs>
  <rect x="0.5" y="0.5" width="899" height="199" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" rx="4"/>
  <text x="450" y="30" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#1E293B">Flujo General del Proceso de Manufactura</text>
  <!-- Cajas: ancho 56px, separación 11px, margen lateral 20px -->
  <g id="stages" font-family="Arial, Helvetica, sans-serif" font-size="6.5" fill="#1E293B">
    <rect x="20" y="54" width="56" height="44" rx="6" fill="#FAD0D0" stroke="#A8201A" stroke-width="1.25"/>
    <text x="48" y="79" text-anchor="middle">Insumos</text>
    <rect x="87" y="54" width="56" height="44" rx="6" fill="#FAD0D0" stroke="#A8201A" stroke-width="1.25"/>
    <text x="115" y="79" text-anchor="middle">Clarificación</text>
    <rect x="154" y="54" width="56" height="44" rx="6" fill="#FAD0D0" stroke="#A8201A" stroke-width="1.25"/>
    <text x="182" y="79" text-anchor="middle">Jarabe</text>
    <rect x="221" y="54" width="56" height="44" rx="6" fill="#FAD0D0" stroke="#A8201A" stroke-width="1.25"/>
    <text x="249" y="79" text-anchor="middle">Mezcla</text>
    <rect x="288" y="54" width="56" height="44" rx="6" fill="#FAD0D0" stroke="#A8201A" stroke-width="1.25"/>
    <text x="316" y="79" text-anchor="middle">Carbonatación</text>
    <rect x="355" y="54" width="56" height="44" rx="6" fill="#FAD0D0" stroke="#A8201A" stroke-width="1.25"/>
    <text x="383" y="79" text-anchor="middle">Llenado</text>
    <rect x="422" y="54" width="56" height="44" rx="6" fill="#FAD0D0" stroke="#A8201A" stroke-width="1.25"/>
    <text x="450" y="79" text-anchor="middle">Sellado</text>
    <rect x="489" y="54" width="56" height="44" rx="6" fill="#FAD0D0" stroke="#A8201A" stroke-width="1.25"/>
    <text x="517" y="79" text-anchor="middle">Etiquetado</text>
    <rect x="556" y="54" width="56" height="44" rx="6" fill="#FAD0D0" stroke="#A8201A" stroke-width="1.25"/>
    <text x="584" y="79" text-anchor="middle">Inspección</text>
    <rect x="623" y="54" width="56" height="44" rx="6" fill="#FAD0D0" stroke="#A8201A" stroke-width="1.25"/>
    <text x="651" y="79" text-anchor="middle">Empaque</text>
    <rect x="690" y="54" width="56" height="44" rx="6" fill="#FAD0D0" stroke="#A8201A" stroke-width="1.25"/>
    <text x="718" y="79" text-anchor="middle">Paletizado</text>
    <rect x="757" y="54" width="56" height="44" rx="6" fill="#FAD0D0" stroke="#A8201A" stroke-width="1.25"/>
    <text x="785" y="79" text-anchor="middle">Almacén</text>
    <rect x="824" y="54" width="56" height="44" rx="6" fill="#FAD0D0" stroke="#A8201A" stroke-width="1.25"/>
    <text x="852" y="79" text-anchor="middle">Despacho</text>
  </g>
  <g stroke="#A8201A" stroke-width="1.25" fill="none" marker-end="url(#arrowhead)">
    <line x1="77" y1="76" x2="84" y2="76"/>
    <line x1="144" y1="76" x2="151" y2="76"/>
    <line x1="211" y1="76" x2="218" y2="76"/>
    <line x1="278" y1="76" x2="285" y2="76"/>
    <line x1="345" y1="76" x2="352" y2="76"/>
    <line x1="412" y1="76" x2="419" y2="76"/>
    <line x1="479" y1="76" x2="486" y2="76"/>
    <line x1="546" y1="76" x2="553" y2="76"/>
    <line x1="613" y1="76" x2="620" y2="76"/>
    <line x1="680" y1="76" x2="687" y2="76"/>
    <line x1="747" y1="76" x2="754" y2="76"/>
    <line x1="814" y1="76" x2="821" y2="76"/>
  </g>
</svg>
